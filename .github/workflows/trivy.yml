name: Scan Trivy des fichiers du repo et des images Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MARIADB_DATABASE: ${{ vars.MARIADB_DATABASE }}
      MARIADB_USER: ${{ vars.MARIADB_USER }}
      WORDPRESS_DB_PASSWORD: ${{ secrets.WORDPRESS_DB_PASSWORD }}
      MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
      GF_SECURITY_ADMIN_USER: ${{ secrets.GF_SECURITY_ADMIN_USER }}
      GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker compose
        run: docker compose config

      - name: Scan Trivy des fichiers du depot
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif

      - name: Upload SARIF du scan filesystem
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Pull Docker images
        run: docker compose pull

      - name: Scan Trivy de l'image prom/prometheus:v3.11.2
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: prom/prometheus:v3.11.2
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-prometheus.sarif

      - name: Upload SARIF de l'image Prometheus
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-prometheus.sarif
          category: trivy-prometheus

      - name: Scan Trivy de l'image grafana/grafana:13.0.1
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: grafana/grafana:13.0.1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-grafana.sarif

      - name: Upload SARIF de l'image Grafana
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-grafana.sarif
          category: trivy-grafana

      - name: Scan Trivy de l'image prom/node-exporter:v1.11.1
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: prom/node-exporter:v1.11.1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-node-exporter.sarif

      - name: Upload SARIF de l'image node-exporter
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-node-exporter.sarif
          category: trivy-node-exporter

      - name: Scan Trivy de l'image mariadb:11.4.10
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: mariadb:11.4.10
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-mariadb.sarif

      - name: Upload SARIF de l'image MariaDB
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-mariadb.sarif
          category: trivy-mariadb

      - name: Scan Trivy de l'image wordpress:6.9.4-php8.3-apache
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: wordpress:6.9.4-php8.3-apache
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-wordpress.sarif

      - name: Upload SARIF de l'image WordPress
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-wordpress.sarif
          category: trivy-wordpress

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate security and quality findings report
        run: python scripts/generate_security_report.py

      - name: Add findings report to workflow summary
        run: Get-Content SECURITY_AND_QUALITY_FINDINGS.md >> $env:GITHUB_STEP_SUMMARY
        shell: pwsh

      - name: Upload findings report
        uses: actions/upload-artifact@v4
        with:
          name: security-and-quality-findings
          path: SECURITY_AND_QUALITY_FINDINGS.md
