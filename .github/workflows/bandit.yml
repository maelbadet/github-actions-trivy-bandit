name: Scan Bandit du script Python

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperation du depot
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation de Bandit
        run: pip install bandit

      - name: Scan des scripts avec Bandit
        run: bandit -r scripts -f txt -o bandit-report.txt -lll -iii

      - name: Envoi du rapport Bandit en artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
